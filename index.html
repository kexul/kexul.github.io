<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kexul · tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/marked.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --base03: #002b36;
  --base02: #073642;
  --base01: #586e75;
  --base00: #657b83;
  --base0:  #839496;
  --base1:  #93a1a1;
  --base2:  #eee8d5;
  --base3:  #fdf6e3;
  --yellow: #b58900;
  --orange: #cb4b16;
  --red:    #dc322f;
  --magenta:#d33682;
  --violet: #6c71c4;
  --blue:   #268bd2;
  --cyan:   #2aa198;
  --green:  #859900;
}

body {
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
  font-size: 14px;
  line-height: 1.8;
  background: var(--base3);
  color: var(--base00);
  min-height: 100vh;
}

/* ── layout ──────────────────────────────────────── */
.vim {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.buf {
  flex: 1;
}

.line {
  min-height: 1.6em;
}

.lc {
  flex: 1;
  padding-right: 1ch;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ── statusline ──────────────────────────────────────── */
.statusline {
  background: var(--base2);
  color: var(--base01);
  padding: 0 1ch;
  display: flex;
  justify-content: space-between;
  line-height: 1.8;
  border-top: 1px solid var(--base1);
  position: sticky;
  bottom: 0;
  font-size: 13px;
}

.statusline a { color: var(--blue); text-decoration: none; }
.statusline a:hover { text-decoration: underline; }

/* ── tabline ─────────────────────────────────────────── */
.tabline {
  background: var(--base2);
  display: flex;
  border-bottom: 1px solid var(--base1);
  position: sticky;
  top: 0;
  z-index: 10;
  overflow-x: auto;
}

.tabline button {
  font-family: inherit;
  font-size: 13px;
  background: var(--base2);
  color: var(--base01);
  border: none;
  padding: 0 2ch;
  line-height: 1.8;
  cursor: pointer;
  white-space: nowrap;
}

.tabline button:hover { background: var(--base3); }
.tabline button.active {
  background: var(--base3);
  color: var(--base00);
  font-weight: bold;
}

.section { display: block; padding: 20px 0; border-bottom: 1px solid var(--base2); }
.section:last-of-type { border-bottom: none; }

/* ── note viewer ── */

/* ── colors ──────────────────────────────────────────── */
.err     { color: var(--red); }
.dim     { color: var(--base1); }

/* ── rendered note content ────────────────────── */
.note-rendered {
  padding: 0 1ch;
  line-height: 1.8;
  font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  font-size: 14px;
  color: var(--base00);
}

.note-rendered h1 { color: var(--yellow); font-size: 1.2em; margin: 0.8em 0 0.4em; font-weight: bold; }
.note-rendered h2 { color: var(--orange); font-size: 1.1em; margin: 0.6em 0 0.3em; font-weight: bold; }
.note-rendered h3 { color: var(--violet); font-size: 1em; margin: 0.5em 0 0.2em; font-weight: bold; }
.note-rendered p  { margin: 0.5em 0; }
.note-rendered img { max-width: 100%; height: auto; margin: 0.5em 0; border: 1px solid var(--base2); }
.note-rendered code { background: var(--base2); padding: 1px 4px; border-radius: 2px; font-size: 0.9em; }
.note-rendered pre { background: var(--base2); padding: 0.5em 1ch; overflow-x: auto; border: 1px solid var(--base1); margin: 0.5em 0; }
.note-rendered pre code { background: none; padding: 0; }
.note-rendered .katex-display { overflow-x: auto; overflow-y: hidden; padding: 0.3em 0; }
.note-rendered a { color: var(--blue); }
.note-rendered ul, .note-rendered ol { margin: 0.3em 0; padding-left: 2ch; }
.note-rendered li { margin: 0.2em 0; }
.note-rendered blockquote { border-left: 3px solid var(--base1); padding-left: 1ch; margin: 0.5em 0; color: var(--base1); }
.note-rendered hr { border: none; border-top: 1px solid var(--base2); margin: 1em 0; }
.note-rendered table { border-collapse: collapse; margin: 0.5em 0; }
.note-rendered th, .note-rendered td { border: 1px solid var(--base2); padding: 4px 8px; text-align: left; }
.note-rendered th { background: var(--base2); }

/* ── links ───────────────────────────────────────── */
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── modal ───────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,43,54,0.35);
  z-index: 100;
  justify-content: center;
  align-items: flex-start;
  padding: 2em 1em;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--base3);
  border: 1px solid var(--base1);
  max-width: 760px;
  width: 100%;
}

.modal-tabline {
  background: var(--base2);
  border-bottom: 1px solid var(--base1);
  display: flex;
  justify-content: space-between;
  padding: 0 1ch;
  line-height: 1.8;
}

.modal-title { color: var(--base00); font-weight: bold; }

.modal-close {
  font-family: inherit;
  background: none;
  border: none;
  color: var(--base01);
  cursor: pointer;
  font-size: inherit;
}
.modal-close:hover { color: var(--red); }

.modal-buf {
  padding: 1ch;
  max-height: 70vh;
  overflow-y: auto;
  line-height: 1.8;
  font-size: 14px;
}

.modal-status {
  background: var(--base2);
  border-top: 1px solid var(--base1);
  padding: 0 1ch;
  line-height: 1.8;
  color: var(--base01);
  font-size: 13px;
}

/* ── small screens ─────────────────────────────── */
@media (max-width: 640px) {
  body { font-size: 12px; }
  .ln { width: 3ch; }
}
</style>
</head>
<body>
<div class="vim">

<!-- ── BUFFER ── -->
<div class="buf">

<!-- ═══ about ═══ -->
<div id="about" class="section">
  <div class="line"><span class="lc"> </span></div>
  <div class="line"><span class="lc">Hi there 👋, 游戏行业搬砖中。</span></div>
  <div class="line"><span class="lc"> </span></div>
  <div class="line"><span class="lc">  🎮  Game Dev      C++, game AI, RL</span></div>
  <div class="line"><span class="lc">  🤖  AI / ML        AIGC, TTS, audio processing</span></div>
  <div class="line"><span class="lc">  📖  Learning      保持好奇, 日拱一卒</span></div>
  <div class="line"><span class="lc"> </span></div>
</div>

<!-- ═══ blog ═══ -->
<div id="blog" class="section">
  <div class="line"><span class="lc"> </span></div>
  <div class="line"><span class="lc">2026-04  <a href="#" onclick="openNote('sd-history.md');return false">Stable Diffusion 学习笔记</a>  DDPM / VAE / VQGAN / SD</span></div>
  <div class="line"><span class="lc"> </span></div>
</div>

</div><!-- /buf -->

<!-- ── STATUSLINE ── -->
<div class="statusline">
  <span><a href="https://github.com/kexul/kexul.github.io">kexul.github.io</a></span>
  <span>tech notes <span id="status-time"></span></span>
</div>

</div><!-- /vim -->

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-tabline">
      <span><button id="modal-back" class="modal-close" onclick="modalBack()"></span><span class="modal-title" id="modal-title">notes/</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-buf" id="modal-buf">loading...</div>
    <div class="modal-status"><span id="modal-filename"></span></div>
  </div>
</div>

<script>
// ── clock in statusline ──
function updateTime() {
  var now = new Date();
  var t = now.toTimeString().slice(0,5);
  document.getElementById('status-time').textContent = t;
}
updateTime();
setInterval(updateTime, 10000);

// ── modal note viewer ──
var noteHistory = [];
var currentNote = '';

function openNote(filename) {
  var overlay = document.getElementById('modal-overlay');
  var buf = document.getElementById('modal-buf');
  var wasOpen = overlay.classList.contains('open');

  // save to history if navigating from within modal
  if (wasOpen && currentNote && currentNote !== filename) {
    noteHistory.push(currentNote);
  }

  currentNote = filename;
  updateModalBack();

  document.getElementById('modal-title').textContent = 'notes/' + filename;
  document.getElementById('modal-filename').textContent = filename;

  buf.innerHTML = 'loading...';
  overlay.classList.add('open');

  fetch('notes/' + filename)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      var dir = filename.substring(0, filename.lastIndexOf('/') + 1);
      text = text.replace(/!\[([^\]]*)\]\((assets\/[^)]+)\)/g, '![$1](notes/' + dir + '$2)');

      // protect math
      var mathBlocks = [], mathInlines = [];
      text = text.replace(/\$\$([\s\S]*?)\$\$/g, function(m) {
        var id = mathBlocks.length;
        mathBlocks.push(m.slice(2, -2));
        return '==BLOCKMATH' + id + '==';
      });
      text = text.replace(/\$([^$]+?)\$/g, function(m) {
        var inner = m.slice(1, -1).trim();
        if (!inner) return m;
        var id = mathInlines.length;
        mathInlines.push(inner);
        return '==INLINEMATH' + id + '==';
      });

      var html = marked.parse(text, { breaks: true, gfm: true });

      // restore math
      html = html.replace(/==BLOCKMATH(\d+)==/g, function(_, id) {
        try { return katex.renderToString(mathBlocks[parseInt(id)], { displayMode: true, throwOnError: false }); }
        catch(e) { return mathBlocks[parseInt(id)]; }
      });
      html = html.replace(/==INLINEMATH(\d+)==/g, function(_, id) {
        try { return katex.renderToString(mathInlines[parseInt(id)], { displayMode: false, throwOnError: false }); }
        catch(e) { return mathInlines[parseInt(id)]; }
      });

      buf.innerHTML = '<div class="note-rendered">' + html + '</div>';

      // intercept .md links inside modal
      buf.querySelectorAll('a[href$=".md"]').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          openNote(a.getAttribute('href'));
        });
      });
    })
    .catch(function(err) {
      buf.innerHTML = '<span class="err">Error: ' + err.message + '</span>';
    });
}

function updateModalBack() {
  var btn = document.getElementById('modal-back');
  if (noteHistory.length > 0) {
    btn.textContent = '\u2190 ';
    btn.style.visibility = 'visible';
  } else {
    btn.style.visibility = 'hidden';
  }
}

function modalBack() {
  var prev = noteHistory.pop();
  if (prev) {
    currentNote = prev;
    openNote(prev);
  } else {
    closeModal();
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  noteHistory = [];
  currentNote = '';
}

// click overlay to close
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
</script>
</body>
</html>
