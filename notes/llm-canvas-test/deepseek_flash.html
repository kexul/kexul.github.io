<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Ocean · 500m</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #02040a; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Colour constants ───
const DEEP_TOP    = [10, 14, 42];   // #0a0e2a deep indigo
const DEEP_BOTTOM = [2,  4,  10];   // #02040a midnight black
const WAVE_TEAL   = [26, 138, 138]; // #1a8a8a
const WAVE_VIOLET = [91, 74, 138];  // #5b4a8a
const WAVE_GOLD   = [196, 164, 74]; // #c4a44a
const PLANKTON_GLOW = [58, 236, 208]; // cold blue-green

// ─── Marine snow particles ───
const particles = [];
const NP = 2200;
for (let i = 0; i < NP; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: 0.3 + Math.random() * 1.2,
    speedY: 0.08 + Math.random() * 0.25,
    speedX: (Math.random() - 0.5) * 0.06,
    driftOffX: Math.random() * 1000, // phase offset for gentle current
    driftOffY: Math.random() * 1000,
    driftAmp: 0.1 + Math.random() * 0.3,
    opacity: 0.15 + Math.random() * 0.45,
    shiver: 0,
    shiverX: 0,
    shiverY: 0,
  });
}

// ─── Bioluminescent plankton ───
const planktons = [];
const NPL = 150;
for (let i = 0; i < NPL; i++) {
  planktons.push({
    x: Math.random() * W,
    y: 0.82 * H + Math.random() * 0.16 * H,
    glow: 0,
    glowDecay: 0.004 + Math.random() * 0.006,
    triggerDist: 20 + Math.random() * 40,
    phase: Math.random() * Math.PI * 2,
  });
}

// ─── Wave rings ───
const waveRings = [];

// ─── Whale ───
const whale = {
  x: -320,
  y: 0.35 * H,
  baseY: 0.35 * H,
  speed: 0.35,
  scale: 1,
  time: 0,
  bodyWave: 0,
  tailSwing: 0,
  songTimer: 8000 + Math.random() * 2000,
  singing: false,
  songDuration: 0,
  // throat position relative to whale center
  throatOffX: 80,
  throatOffY: 5,
};

// ─── Helpers ───
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

// ─── Whale drawing ───
function drawWhale(c, w, t) {
  const { x, y, scale, bodyWave, tailSwing } = w;
  const s = scale;
  const L = 300 * s;
  const Hh = 55 * s; // half-height

  c.save();
  c.translate(x, y);
  c.scale(s, s);

  const bw = bodyWave;

  // ── Body ──
  c.beginPath();
  c.moveTo(0, bw);

  // Top profile (nose → tail)
  c.bezierCurveTo(55, -28 + bw,        110, -34 + bw*0.8,  160, -32 + bw*0.5);
  c.bezierCurveTo(210, -27 + bw*0.2,   245, -16 + bw*0.1,  268, -6);
  c.lineTo(280, 0);

  // Bottom profile (tail → nose)
  c.lineTo(268, 4);
  c.bezierCurveTo(245, 10,              210, 17,            160, 19);
  c.bezierCurveTo(110, 19,              55,  10,            0,   bw);
  c.closePath();

  const grad = c.createLinearGradient(0, -35 * s, 0, 22 * s);
  grad.addColorStop(0,    '#3d4d60');
  grad.addColorStop(0.35, '#5b6b7d');
  grad.addColorStop(0.6,  '#7a8a9a');
  grad.addColorStop(0.85, '#a0b0c0');
  grad.addColorStop(1,    '#c8d4de');
  c.fillStyle = grad;
  c.fill();

  // ── Belly patch ──
  c.beginPath();
  c.moveTo(35, 2);
  c.bezierCurveTo(90,  13,  150, 16,  210, 12);
  c.bezierCurveTo(235, 10,  255, 6,   268, 3);
  c.lineTo(268, 0);
  c.lineTo(245, 1);
  c.bezierCurveTo(210, 5,   150, 8,   90,  5);
  c.bezierCurveTo(60,  3,   35,  1,   35,  0);
  c.closePath();
  c.fillStyle = 'rgba(200, 218, 230, 0.45)';
  c.fill();

  // ── Dorsal fin ──
  c.beginPath();
  c.moveTo(208, -18 * s);
  c.quadraticCurveTo(213, -30 * s, 218, -26 * s);
  c.quadraticCurveTo(220, -22 * s, 218, -18 * s);
  c.closePath();
  c.fillStyle = '#3d4d60';
  c.fill();

  // ── Tail flukes ──
  c.save();
  c.translate(280, 0);
  c.rotate(tailSwing);

  // upper fluke
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(12, -20 * s, 28, -42 * s, 18, -58 * s);
  c.bezierCurveTo(6,  -42 * s, -4, -22 * s, 0,  0);
  c.fillStyle = '#3d4d60';
  c.fill();

  // lower fluke
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(12, 20 * s, 28, 42 * s, 18, 58 * s);
  c.bezierCurveTo(6,  42 * s, -4, 22 * s, 0,  0);
  c.fillStyle = '#6a7a8a';
  c.fill();

  // fluke trailing edge detail
  c.beginPath();
  c.moveTo(14, -8 * s);
  c.quadraticCurveTo(22, -30 * s, 14, -40 * s);
  c.strokeStyle = 'rgba(200, 215, 230, 0.15)';
  c.lineWidth = 1;
  c.stroke();
  c.beginPath();
  c.moveTo(14, 8 * s);
  c.quadraticCurveTo(22, 30 * s, 14, 40 * s);
  c.stroke();

  c.restore();

  // ── Eye ──
  c.beginPath();
  c.arc(22 * s, -5 * s, 2.5 * s, 0, Math.PI * 2);
  c.fillStyle = '#14141e';
  c.fill();
  c.beginPath();
  c.arc(23 * s, -6 * s, 0.8 * s, 0, Math.PI * 2);
  c.fillStyle = 'rgba(180, 200, 220, 0.5)';
  c.fill();

  // ── Mouth line ──
  c.beginPath();
  c.moveTo(5 * s, 2 * s);
  c.quadraticCurveTo(35 * s, 3 * s, 55 * s, 0);
  c.strokeStyle = 'rgba(30, 40, 55, 0.25)';
  c.lineWidth = 1;
  c.stroke();

  c.restore();
}

// ─── Spawn whale song rings ───
function spawnSong(cx, cy) {
  const thickness = 8 + Math.random() * 6;
  const now = elapsed;
  // Spawn multiple ring triplets over ~2 s (one triplet every 350 ms)
  for (let i = 0; i < 6; i++) {
    const delay = i * 350;
    waveRings.push({
      cx, cy,
      radius: 10,
      speed: 1.6 + Math.random() * 0.3,
      maxRadius: Math.max(W, H) * 1.0,
      color: 'teal',
      r: WAVE_TEAL[0], g: WAVE_TEAL[1], b: WAVE_TEAL[2],
      opacity: 0.55,
      decay: 0.0025,
      thickness: thickness + Math.random() * 4,
      birth: now + delay,
      alive: false,
    });
    waveRings.push({
      cx, cy,
      radius: 10,
      speed: 1.6 + Math.random() * 0.3,
      maxRadius: Math.max(W, H) * 1.0,
      color: 'violet',
      r: WAVE_VIOLET[0], g: WAVE_VIOLET[1], b: WAVE_VIOLET[2],
      opacity: 0.50,
      decay: 0.004,
      thickness: thickness + Math.random() * 4,
      birth: now + delay + 80,
      alive: false,
    });
    waveRings.push({
      cx, cy,
      radius: 10,
      speed: 1.6 + Math.random() * 0.3,
      maxRadius: Math.max(W, H) * 1.0,
      color: 'gold',
      r: WAVE_GOLD[0], g: WAVE_GOLD[1], b: WAVE_GOLD[2],
      opacity: 0.40,
      decay: 0.007,
      thickness: thickness + Math.random() * 4,
      birth: now + delay + 160,
      alive: false,
    });
  }
}

// ─── Draw pressure waves ───
function drawWaves(c, time) {
  if (waveRings.length === 0) return;

  c.save();
  c.globalCompositeOperation = 'screen';

  // Collect active wave rings
  const active = waveRings.filter(w => w.alive && w.opacity > 0.005);
  if (active.length === 0) { c.restore(); return; }

  // Draw each ring with shadow glow
  for (const w of active) {
    const op = clamp(w.opacity, 0, 1);
    const col = `rgba(${w.r|0},${w.g|0},${w.b|0},${op})`;

    // Outer soft glow via shadow
    c.shadowColor = `rgba(${w.r|0},${w.g|0},${w.b|0},${op * 0.35})`;
    c.shadowBlur = 55;
    c.strokeStyle = col;
    c.lineWidth = w.thickness;
    c.beginPath();
    c.arc(w.cx, w.cy, w.radius, 0, Math.PI * 2);
    c.stroke();

    // Inner sharper core ring
    c.shadowBlur = 0;
    c.globalAlpha = op * 0.25;
    c.strokeStyle = `rgba(${w.r|0},${w.g|0},${w.b|0},${op * 0.3})`;
    c.lineWidth = w.thickness * 0.35;
    c.beginPath();
    c.arc(w.cx, w.cy, w.radius, 0, Math.PI * 2);
    c.stroke();
    c.globalAlpha = 1;
  }

  c.restore();

  // ── Iridescent interference arcs where rings overlap ──
  // Find pairs of active rings from different color groups that are close in radius
  c.save();
  c.globalCompositeOperation = 'screen';
  for (let i = 0; i < active.length; i++) {
    for (let j = i + 1; j < active.length; j++) {
      const a = active[i], b = active[j];
      if (a.color === b.color) continue; // different colors only
      const dr = Math.abs(a.radius - b.radius);
      if (dr > 25) continue; // too far apart

      // Distance between centers
      const dx = a.cx - b.cx;
      const dy = a.cy - b.cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      const avgR = (a.radius + b.radius) / 2;

      // The rings intersect when |d - avgR| is small (roughly)
      // Draw a bright iridescent highlight where they're close
      const closeness = 1 - clamp(dr / 25, 0, 1);
      const iriOp = closeness * 0.35 * Math.min(a.opacity, b.opacity);

      if (iriOp > 0.02) {
        // Mix the two colors for iridescence
        const mixR = clamp((a.r + b.r) / 2 + 60, 0, 255);
        const mixG = clamp((a.g + b.g) / 2 + 30, 0, 255);
        const mixB = clamp((a.b + b.b) / 2 + 80, 0, 255);

        c.shadowColor = `rgba(${mixR|0},${mixG|0},${mixB|0},${iriOp * 0.4})`;
        c.shadowBlur = 30;
        c.strokeStyle = `rgba(${mixR|0},${mixG|0},${mixB|0},${iriOp})`;
        c.lineWidth = 6;
        c.beginPath();
        c.arc((a.cx + b.cx) / 2, (a.cy + b.cy) / 2, avgR, 0, Math.PI * 2);
        c.stroke();
      }
    }
  }
  c.restore();
}

// ─── Particle wave interaction ───
function applyWaveToParticles(particles, waveRings, time) {
  const active = waveRings.filter(w => w.alive && w.opacity > 0.01);
  if (active.length === 0) return;

  for (const p of particles) {
    let totalKick = 0;
    let kx = 0, ky = 0;

    for (const w of active) {
      const dx = p.x - w.cx;
      const dy = p.y - w.cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ringDist = Math.abs(dist - w.radius);

      if (ringDist < w.thickness * 1.2 && dist > 0) {
        const influence = 1 - ringDist / (w.thickness * 1.2);
        const kick = influence * 1.2 * w.opacity;
        totalKick += kick;
        // Push outward from wave center
        kx += (dx / dist) * kick;
        ky += (dy / dist) * kick;
      }
    }

    if (totalKick > 0.01) {
      p.shiver = 1;
      p.shiverX = kx * 2 + (Math.random() - 0.5) * 0.8;
      p.shiverY = ky * 2 + (Math.random() - 0.5) * 0.8;
    }
  }
}

// ─── Plankton wave interaction ───
function applyWaveToPlankton(planktons, waveRings) {
  const active = waveRings.filter(w => w.alive && w.opacity > 0.02);
  if (active.length === 0) return;

  for (const pl of planktons) {
    let maxInfluence = 0;
    for (const w of active) {
      const dx = pl.x - w.cx;
      const dy = pl.y - w.cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ringDist = Math.abs(dist - w.radius);
      if (ringDist < 60) {
        const inf = (1 - ringDist / 60) * w.opacity;
        if (inf > maxInfluence) maxInfluence = inf;
      }
    }
    if (maxInfluence > 0.05) {
      pl.glow = Math.min(1, pl.glow + maxInfluence * 0.6);
    }
  }
}

// ─── Scene drawing ───
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,    `rgb(${DEEP_TOP[0]},${DEEP_TOP[1]},${DEEP_TOP[2]})`);
  grad.addColorStop(0.4,  `rgb(${lerp(DEEP_TOP[0],DEEP_BOTTOM[0],0.5)|0},${lerp(DEEP_TOP[1],DEEP_BOTTOM[1],0.5)|0},${lerp(DEEP_TOP[2],DEEP_BOTTOM[2],0.5)|0})`);
  grad.addColorStop(1,    `rgb(${DEEP_BOTTOM[0]},${DEEP_BOTTOM[1]},${DEEP_BOTTOM[2]})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Ocean floor silhouette ───
function drawOceanFloor() {
  ctx.fillStyle = 'rgba(1, 3, 8, 0.6)';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 8) {
    const y = H - (15 + Math.sin(x * 0.008) * 10 + Math.sin(x * 0.025) * 6 + Math.sin(x * 0.05) * 3);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

// ─── Particle rendering ───
function drawParticles(c, pts, frontOnly) {
  for (const p of pts) {
    const depth = p.y / H; // 0 at top, 1 at bottom
    const layer = p.size > 0.7 ? 1 : 0; // larger particles = foreground
    if (frontOnly && layer === 0) continue;
    if (!frontOnly && layer === 1) continue;

    let op = p.opacity * (0.5 + depth * 0.5);
    if (p.shiver > 0.01) op = Math.min(1, op * (1 + p.shiver * 2));

    if (op < 0.02) continue;

    c.beginPath();
    c.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    c.fillStyle = `rgba(200, 215, 230, ${op})`;
    c.fill();
  }
}

// ─── Plankton rendering ───
function drawPlankton(c, pts) {
  for (const pl of pts) {
    // Dim base dot
    const baseOp = 0.04 + (pl.y / H) * 0.04;
    c.beginPath();
    c.arc(pl.x, pl.y, 1.2, 0, Math.PI * 2);
    c.fillStyle = `rgba(180, 230, 220, ${baseOp})`;
    c.fill();

    // Glow
    if (pl.glow > 0.01) {
      const g = clamp(pl.glow, 0, 1);
      // Outer glow
      const grad = c.createRadialGradient(pl.x, pl.y, 0, pl.x, pl.y, 4 + g * 20);
      grad.addColorStop(0, `rgba(${PLANKTON_GLOW[0]},${PLANKTON_GLOW[1]},${PLANKTON_GLOW[2]},${g * 0.9})`);
      grad.addColorStop(0.3, `rgba(${PLANKTON_GLOW[0]},${PLANKTON_GLOW[1]},${PLANKTON_GLOW[2]},${g * 0.3})`);
      grad.addColorStop(1, `rgba(${PLANKTON_GLOW[0]},${PLANKTON_GLOW[1]},${PLANKTON_GLOW[2]},0)`);
      c.beginPath();
      c.arc(pl.x, pl.y, 4 + g * 20, 0, Math.PI * 2);
      c.fillStyle = grad;
      c.fill();

      // Core
      c.beginPath();
      c.arc(pl.x, pl.y, 1.5, 0, Math.PI * 2);
      c.fillStyle = `rgba(200, 255, 240, ${g * 0.8})`;
      c.fill();
    }
  }
}

// ─── Main loop (use a single clock throughout) ───
let lastTime = 0;
let elapsed = 0;


function loop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50); // cap at ~20 fps min
  lastTime = timestamp;
  elapsed += dt;

  const ms = elapsed; // ms since start
  const t = ms / 1000; // seconds

  // ── Update whale ──
  const w = whale;
  w.time = t;
  w.bodyWave = Math.sin(t * 0.3) * 3;
  w.tailSwing = Math.sin(t * 0.7) * 0.35;

  // Horizontal movement
  w.x += w.speed * (dt * 0.06); // smooth speed in px/frame
  // Wrap around
  if (w.x > W + 350) {
    w.x = -350;
    w.y = w.baseY + (Math.random() - 0.5) * 30;
  }
  // Gentle vertical drift
  w.y = w.baseY + Math.sin(t * 0.08) * 15 + Math.sin(t * 0.13) * 5;

  // ── Song timer ──
  w.songTimer -= dt;
  if (w.songTimer <= 0) {
    const throatX = w.x + w.throatOffX * w.scale;
    const throatY = w.y + w.throatOffY * w.scale;
    spawnSong(throatX, throatY);
    w.songTimer = 8000 + Math.random() * 2000;
    w.singing = true;
    w.songDuration = 0;
  }

  // ── Update wave rings ──
  const now = elapsed;
  for (let i = waveRings.length - 1; i >= 0; i--) {
    const r = waveRings[i];
    if (now >= r.birth) {
      r.alive = true;
      r.radius += r.speed * (dt * 0.06);
      r.opacity -= r.decay * (dt * 0.06);
      if (r.radius > r.maxRadius || r.opacity <= 0) {
        waveRings.splice(i, 1);
        continue;
      }
    }
  }

  // ── Update particles ──
  for (const p of particles) {
    // Base drift
    const driftX = Math.sin(t * 0.15 + p.driftOffX) * p.driftAmp;
    const driftY = Math.cos(t * 0.1 + p.driftOffY) * p.driftAmp * 0.3;

    p.x += p.speedX + driftX * 0.01;
    p.y += p.speedY + driftY * 0.005;

    // Shiver decay (time-based)
    if (p.shiver > 0) {
      const decay = dt * 0.06; // normalize to ~60fps
      p.x += p.shiverX * decay;
      p.y += p.shiverY * decay;
      p.shiver *= Math.pow(0.92, decay);
      p.shiverX *= Math.pow(0.9, decay);
      p.shiverY *= Math.pow(0.9, decay);
      if (p.shiver < 0.001) p.shiver = 0;
    }

    // Wrap (wrap top too — wave shivers can push particles upward)
    if (p.x < -5) p.x = W + 5;
    if (p.x > W + 5) p.x = -5;
    if (p.y > H + 5) { p.y = -5; p.x = Math.random() * W; }
    if (p.y < -10) p.y = H + 5;
  }

  // ── Apply wave to particles ──
  applyWaveToParticles(particles, waveRings, t);

  // ── Apply wave to plankton ──
  applyWaveToPlankton(planktons, waveRings);

  // ── Update plankton glow ──
  for (const pl of planktons) {
    pl.glow -= pl.glowDecay * (dt * 0.06);
    if (pl.glow < 0) pl.glow = 0;
  }

  // ── ── ── RENDER ── ── ──

  // Background
  drawBackground();

  // Ocean floor
  drawOceanFloor();

  // Back particles (small)
  drawParticles(ctx, particles, false);

  // Plankton base
  drawPlankton(ctx, planktons);

  // Pressure waves (with interference)
  drawWaves(ctx, t);

  // Whale
  drawWhale(ctx, w, t);

  // Foreground particles (large)
  drawParticles(ctx, particles, true);

  // ── Draw indicator dot at throat (debug-ish but helps sell the source) ──
  // (very subtle)
  const throatX = w.x + w.throatOffX * w.scale;
  const throatY = w.y + w.throatOffY * w.scale;
  if (w.singing && w.songDuration < 3000) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const g = ctx.createRadialGradient(throatX, throatY, 0, throatX, throatY, 25);
    g.addColorStop(0, 'rgba(100, 180, 200, 0.08)');
    g.addColorStop(1, 'rgba(100, 180, 200, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(throatX, throatY, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  w.songDuration += dt;

  // ── Cleanup old wave rings (limit memory) ──
  if (waveRings.length > 200) {
    waveRings.splice(0, waveRings.length - 150);
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// ─── Resize handling (preserve old dimensions for proportional repositioning) ───
window.addEventListener('resize', () => {
  const oldW = W, oldH = H;
  resize();
  if (oldW > 0 && oldH > 0) {
    for (const p of particles) {
      p.x = (p.x / oldW) * W;
      p.y = (p.y / oldH) * H;
    }
    for (const pl of planktons) {
      const relY = (pl.y - 0.82 * oldH) / (0.16 * oldH);
      pl.x = (pl.x / oldW) * W;
      pl.y = 0.82 * H + relY * 0.16 * H;
    }
  }
  // Recalculate whale base Y
  whale.baseY = 0.35 * H;
});
</script>
</body>
</html>
